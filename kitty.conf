include Catppuccin-Mocha.conf

font_family                         Iosevka Nerd Font Mono
font_size                           16.0
cursor_shape                        beam
cursor_blink_interval         		0
cursor_trail                        1
drag_threshold                      0
window_padding_width          		10
tab_bar_edge                        top
tab_bar_style                       powerline
tab_powerline_style                 round
background_opacity					0.8
background_blur						20
background_image              		~/Wallpapers/artemis.jpg
background_image_layout       		cscaled
background_tint                     0.8
macos_option_as_alt                 yes
enabled_layouts                     splits
confirm_os_window_close				2

# kitty_mod = CTRL+SHIFT
map kitty_mod+\                     launch --location=vsplit --cwd=current
map kitty_mod+-                     launch --location=hsplit --cwd=current
map cmd+equal                       change_font_size current +2.0
map cmd+minus                       change_font_size current -2.0
map cmd+0                           change_font_size current 0
